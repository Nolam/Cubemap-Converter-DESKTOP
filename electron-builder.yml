appId: com.davidparrella.cubemap-to-hdri
productName: CubeMap to HDRI Converter
copyright: Copyright (c) David Parrella

directories:
  output: release

files:
  - dist/**/*
  - electron/**/*
  - node_modules/**/*
  - package.json

extraMetadata:
  main: electron/main.mjs

win:
  target:
    - target: portable
      arch:
        - x64
  icon: null

mac:
  target:
    - target: zip
      arch:
        - x64
        - arm64
  icon: null
  category: public.app-category.graphics-design

linux:
  target:
    - target: AppImage
      arch:
        - x64
